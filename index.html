<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200" />
  <style>
    .roboto-font {
      font-family: "Roboto", sans-serif;
      font-optical-sizing: auto;
      font-weight: 300;
      font-style: normal;
      font-variation-settings:
        "wdth" 100;
    }
    h1 {
      position: absolute;
      top: 40%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    #wk {
      position: absolute;
      top: 55%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    #sc {
      position: absolute;
      top: 60%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    #mn {
      position: absolute;
      top: 65%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
    #ms {
      position: absolute;
      top: 70%;
      left: 50%;
      transform: translate(-50%, -50%);
      margin: 0;
    }
  </style>
<body>
  <h1 class="roboto-font">~<span id="valDy">#</span> days untill the end of school.</h1>
  <p id="wk" class="roboto-font">~<span id="valWk">#</span> weeks</p>
  <p id="mn" class="roboto-font">~<span id="valMn">#</span> minutes</p>
  <p id="sc" class="roboto-font">~<span id="valSc">#</span> seconds</p>
  <p id="ms" class="roboto-font">~<span id="valMs">#</span> milliseconds</p>
  <script>
    const targetDate = new Date("May 20, 2026 15:58:00").getTime();
    setInterval(function() {
    const now = new Date().getTime();
    const diffInDays = Math.ceil((targetDate - now) / (1000 * 60 * 60 * 24));
    const diffInWeeks = diffInDays / 7
    const diffInSecs = Math.ceil((targetDate - now) / 1000);
    const diffInMins = Math.ceil((targetDate - now) / (1000 * 60));
    const diffInMillis = Math.ceil((targetDate - now));
    document.getElementById("valDy").innerText = diffInDays;
    document.getElementById("valWk").innerText = diffInWeeks;
    document.getElementById("valSc").innerText = diffInSecs;
    document.getElementById("valMn").innerText = diffInMins;
    document.getElementById("valMs").innerText = diffInMillis;
    }, 1)
  </script>
</body>
